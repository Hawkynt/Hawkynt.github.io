<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="cg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a6"/>
      <stop offset="100%" stop-color="#184"/>
    </linearGradient>
  </defs>
  <!-- Table felt -->
  <rect x="2" y="2" width="44" height="44" rx="6" fill="url(#cg)"/>
  <!-- Card 1 (back, tilted left) -->
  <rect x="8" y="10" width="16" height="22" rx="2" fill="#246" stroke="#fff" stroke-width="0.5" transform="rotate(-12 16 21)"/>
  <rect x="10" y="12" width="12" height="18" rx="1" fill="#135" transform="rotate(-12 16 21)"/>
  <!-- Card 2 (face, center) -->
  <rect x="16" y="8" width="16" height="22" rx="2" fill="#fff" stroke="#aaa" stroke-width="0.5"/>
  <text x="19" y="17" font-size="7" fill="#c00" font-family="serif" font-weight="bold">A</text>
  <text x="19" y="26" font-size="10" fill="#c00" font-family="serif">♥</text>
  <!-- Card 3 (back, tilted right) -->
  <rect x="24" y="10" width="16" height="22" rx="2" fill="#246" stroke="#fff" stroke-width="0.5" transform="rotate(12 32 21)"/>
  <rect x="26" y="12" width="12" height="18" rx="1" fill="#135" transform="rotate(12 32 21)"/>
  <!-- Chips -->
  <circle cx="12" cy="40" r="4" fill="#e44" stroke="#fff" stroke-width="0.5"/>
  <circle cx="24" cy="40" r="4" fill="#48f" stroke="#fff" stroke-width="0.5"/>
  <circle cx="36" cy="40" r="4" fill="#fa0" stroke="#fff" stroke-width="0.5"/>
  <!-- Sparkle -->
  <circle cx="38" cy="8" r="1.5" fill="#ff0" opacity="0.8"/>
  <circle cx="41" cy="11" r="1" fill="#ff0" opacity="0.5"/>
</svg>
