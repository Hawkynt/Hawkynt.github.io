<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Road / lanes -->
  <rect x="4" y="30" width="40" height="14" rx="2" fill="#555"/>
  <line x1="18" y1="30" x2="18" y2="44" stroke="#fff" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="30" y1="30" x2="30" y2="44" stroke="#fff" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Runner figure -->
  <circle cx="24" cy="14" r="5" fill="#4ec0ca"/>
  <line x1="24" y1="19" x2="24" y2="29" stroke="#4ec0ca" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="18" y2="18" stroke="#4ec0ca" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="22" x2="30" y2="26" stroke="#4ec0ca" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="29" x2="19" y2="36" stroke="#4ec0ca" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="29" x2="29" y2="36" stroke="#4ec0ca" stroke-width="2" stroke-linecap="round"/>
  <!-- Speed lines -->
  <line x1="2" y1="16" x2="12" y2="16" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>
  <line x1="4" y1="20" x2="14" y2="20" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
  <line x1="3" y1="24" x2="11" y2="24" stroke="#ffd700" stroke-width="1.5" opacity="0.6"/>
  <!-- Coin -->
  <circle cx="38" cy="10" r="4" fill="#ffd700" stroke="#daa520" stroke-width="1"/>
  <text x="38" y="13" font-size="6" font-weight="bold" fill="#8b6914" text-anchor="middle">$</text>
</svg>
