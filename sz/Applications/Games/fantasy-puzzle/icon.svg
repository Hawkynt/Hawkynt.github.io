<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background crystal -->
  <polygon points="24,4 38,18 38,34 24,44 10,34 10,18" fill="#1a1040" stroke="#846" stroke-width="1"/>
  <!-- Fire element -->
  <circle cx="14" cy="16" r="5" fill="#f60" opacity="0.8"/>
  <text x="14" y="18" text-anchor="middle" font-size="6" fill="#ff0">🔥</text>
  <!-- Water element -->
  <circle cx="34" cy="16" r="5" fill="#28f" opacity="0.8"/>
  <text x="34" y="18" text-anchor="middle" font-size="6" fill="#4cf">💧</text>
  <!-- Earth element -->
  <circle cx="14" cy="34" r="5" fill="#840" opacity="0.8"/>
  <text x="14" y="36" text-anchor="middle" font-size="6" fill="#a62">🪨</text>
  <!-- Air element -->
  <circle cx="34" cy="34" r="5" fill="#aaf" opacity="0.8"/>
  <text x="34" y="36" text-anchor="middle" font-size="6" fill="#eef">💨</text>
  <!-- Central rune glyph -->
  <circle cx="24" cy="24" r="7" fill="none" stroke="#c8f" stroke-width="1.5" opacity="0.9"/>
  <text x="24" y="27" text-anchor="middle" font-size="10" fill="#c8f">ᚱ</text>
</svg>
