<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Deep space background -->
  <rect width="48" height="48" rx="4" fill="#0a0a2a"/>
  <!-- Stars -->
  <circle cx="8" cy="8" r="0.8" fill="#fff" opacity="0.7"/>
  <circle cx="40" cy="12" r="0.6" fill="#fff" opacity="0.5"/>
  <circle cx="15" cy="38" r="0.7" fill="#fff" opacity="0.6"/>
  <circle cx="35" cy="40" r="0.5" fill="#fff" opacity="0.4"/>
  <circle cx="28" cy="6" r="0.6" fill="#fff" opacity="0.5"/>
  <!-- Gravity well - purple spiral -->
  <circle cx="24" cy="22" r="10" fill="none" stroke="#6644cc" stroke-width="1" opacity="0.3"/>
  <circle cx="24" cy="22" r="7" fill="none" stroke="#8866ff" stroke-width="1" opacity="0.4"/>
  <circle cx="24" cy="22" r="4" fill="none" stroke="#aa88ff" stroke-width="1" opacity="0.5"/>
  <circle cx="24" cy="22" r="3" fill="#8866ff" opacity="0.8"/>
  <!-- Probe object - blue dot -->
  <circle cx="10" cy="36" r="4" fill="#44aaff" opacity="0.9"/>
  <circle cx="9" cy="35" r="1.5" fill="#aaddff"/>
  <!-- Trajectory arrow -->
  <line x1="14" y1="33" x2="20" y2="27" stroke="#44aaff" stroke-width="1.5" stroke-dasharray="2,2" opacity="0.6"/>
  <!-- Goal target -->
  <circle cx="38" cy="10" r="5" fill="none" stroke="#00ff88" stroke-width="1.5" opacity="0.7"/>
  <circle cx="38" cy="10" r="2.5" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
  <!-- Asteroid -->
  <circle cx="32" cy="34" r="5" fill="#665544"/>
  <circle cx="30" cy="33" r="1.5" fill="#554433"/>
</svg>
