<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
  </defs>
  <!-- Stove top -->
  <rect x="6" y="20" width="36" height="24" rx="3" fill="#333"/>
  <rect x="8" y="22" width="32" height="20" rx="2" fill="#444"/>
  <!-- Burner -->
  <circle cx="18" cy="32" r="7" fill="#622" stroke="#f44" stroke-width="1.5"/>
  <circle cx="18" cy="32" r="3" fill="#f44" opacity="0.6"/>
  <!-- Pan -->
  <ellipse cx="18" cy="28" rx="9" ry="4" fill="url(#pg)"/>
  <rect x="26" y="26" width="12" height="3" rx="1" fill="#666"/>
  <!-- Steam particles -->
  <circle cx="14" cy="18" r="2" fill="#fff" opacity="0.3"/>
  <circle cx="18" cy="14" r="2.5" fill="#fff" opacity="0.25"/>
  <circle cx="22" cy="16" r="2" fill="#fff" opacity="0.2"/>
  <!-- Star rating -->
  <polygon points="38,8 39.5,12 44,12 40.5,14.5 41.5,19 38,16.5 34.5,19 35.5,14.5 32,12 36.5,12" fill="#fa0"/>
  <!-- Food sparkle -->
  <circle cx="16" cy="26" r="1" fill="#ff0" opacity="0.7"/>
  <circle cx="20" cy="27" r="0.8" fill="#ff0" opacity="0.5"/>
</svg>
