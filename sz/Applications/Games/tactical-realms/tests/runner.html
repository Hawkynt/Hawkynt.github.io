<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tactical Realms -- Test Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Consolas', 'Courier New', monospace; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
  h1 { margin-bottom: 4px; font-size: 18px; color: #569cd6; }
  h2 { margin-bottom: 16px; font-size: 13px; color: #808080; font-weight: normal; }
  h3 { font-size: 14px; color: #dcdcaa; margin: 12px 0 4px; }
  #test-summary { padding: 10px 14px; margin-bottom: 16px; border-radius: 4px; font-size: 14px; font-weight: bold; }
  #test-summary.running { background: #2d2d2d; color: #cccccc; }
  #test-summary.pass { background: #1b3a1b; color: #4ec94e; }
  #test-summary.fail { background: #3a1b1b; color: #f44747; }
  .suite { margin-bottom: 8px; }
  .test { padding: 2px 8px; font-size: 13px; }
  .test.pass { color: #4ec94e; }
  .test.fail { color: #f44747; }
  .test.skip { color: #cca700; }
  .error-detail { margin: 2px 0 6px 24px; padding: 6px 10px; background: #2d1b1b; color: #f88; border-left: 3px solid #f44747; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
</style>
</head>
