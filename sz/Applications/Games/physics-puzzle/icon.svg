<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Background -->
  <rect x="2" y="2" width="44" height="44" rx="6" fill="#1a1040" stroke="#fa0" stroke-width="1"/>
  <!-- Launcher -->
  <rect x="6" y="34" width="12" height="4" rx="1" fill="#666"/>
  <!-- Trajectory arc -->
  <path d="M12 34 Q24 10 40 28" fill="none" stroke="#fa0" stroke-width="2" stroke-dasharray="3,2" opacity="0.8"/>
  <!-- Projectile -->
  <circle cx="40" cy="28" r="4" fill="#f80"/>
  <!-- Target star -->
  <text x="40" y="14" text-anchor="middle" font-size="10" fill="#0f0">⭐</text>
  <!-- Ramp -->
  <polygon points="20,40 30,40 30,34" fill="#66a" opacity="0.7"/>
  <!-- Spring -->
  <rect x="34" y="38" width="8" height="4" rx="1" fill="#0a0" opacity="0.7"/>
</svg>
