<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Track ring -->
  <ellipse cx="24" cy="26" rx="20" ry="14" fill="none" stroke="#445" stroke-width="4"/>
  <ellipse cx="24" cy="26" rx="20" ry="14" fill="none" stroke="#667" stroke-width="2"/>
  <!-- Boost pad glow -->
  <rect x="6" y="22" width="6" height="3" rx="1" fill="#0ff" opacity="0.7"/>
  <rect x="6" y="22" width="6" height="3" rx="1" fill="#0ff" opacity="0.3" filter="url(#glow)"/>
  <!-- Ship 1 (player) -->
  <polygon points="38,14 42,20 38,18 34,20" fill="#4af" stroke="#2cf" stroke-width="0.5"/>
  <!-- Flame trail -->
  <line x1="35" y1="19" x2="30" y2="22" stroke="#f80" stroke-width="2" opacity="0.8"/>
  <line x1="35" y1="19" x2="28" y2="24" stroke="#ff0" stroke-width="1" opacity="0.5"/>
  <!-- Ship 2 (AI) -->
  <polygon points="16,34 20,40 16,38 12,40" fill="#f55" stroke="#f88" stroke-width="0.5"/>
  <!-- Speed lines -->
  <line x1="44" y1="12" x2="44" y2="8" stroke="#fff" stroke-width="0.5" opacity="0.4"/>
  <line x1="46" y1="14" x2="46" y2="10" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Finish flag -->
  <rect x="22" y="10" width="4" height="4" fill="#fff"/>
  <rect x="22" y="10" width="2" height="2" fill="#111"/>
  <rect x="24" y="12" width="2" height="2" fill="#111"/>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
</svg>
