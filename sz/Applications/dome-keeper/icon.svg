<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Sky background -->
  <rect width="48" height="24" fill="#1a1a3a"/>
  <!-- Underground background -->
  <rect y="24" width="48" height="24" fill="#2a1a0a"/>
  <!-- Ground line -->
  <line x1="0" y1="24" x2="48" y2="24" stroke="#5a4a2a" stroke-width="2"/>
  <!-- Dome -->
  <path d="M12,24 Q12,8 24,8 Q36,8 36,24" fill="none" stroke="#4af" stroke-width="2.5"/>
  <circle cx="24" cy="14" r="2" fill="#4af" opacity="0.6"/>
  <!-- Laser beam -->
  <line x1="24" y1="12" x2="40" y2="4" stroke="#f44" stroke-width="1.5" opacity="0.8"/>
  <circle cx="40" cy="4" r="2" fill="#f44" opacity="0.6"/>
  <!-- Enemy -->
  <circle cx="42" cy="6" r="3" fill="#a33" opacity="0.7"/>
  <!-- Underground ore deposits -->
  <circle cx="14" cy="32" r="3" fill="#888" stroke="#aaa" stroke-width="0.5"/>
  <text x="14" y="33.5" text-anchor="middle" font-size="4" fill="#ccc">Fe</text>
  <circle cx="30" cy="36" r="3" fill="#48f" stroke="#6af" stroke-width="0.5"/>
  <text x="30" y="37.5" text-anchor="middle" font-size="4" fill="#cef">H2O</text>
  <circle cx="22" cy="42" r="3" fill="#44a" stroke="#66c" stroke-width="0.5"/>
  <text x="22" y="43.5" text-anchor="middle" font-size="4" fill="#aaf">Co</text>
  <!-- Pickaxe hint -->
  <line x1="36" y1="28" x2="40" y2="36" stroke="#da2" stroke-width="1.5"/>
  <line x1="38" y1="30" x2="42" y2="28" stroke="#da2" stroke-width="1.5"/>
</svg>
