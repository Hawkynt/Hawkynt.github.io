  <circle cx="30" cy="18" r="12" fill="none" stroke="#88ddff" stroke-width="2" opacity="0.8"/>
  <circle cx="30" cy="18" r="10" fill="rgba(100,200,255,0.15)"/>
  <circle cx="26" cy="14" r="3" fill="rgba(255,255,255,0.4)"/>
