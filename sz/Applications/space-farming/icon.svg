<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Space station background -->
  <rect x="4" y="30" width="40" height="14" rx="3" fill="#1a2a1a" stroke="#3a5a3a" stroke-width="1"/>
  <!-- Soil rows -->
  <rect x="8" y="33" width="10" height="4" rx="1" fill="#3a2a1a"/>
  <rect x="20" y="33" width="10" height="4" rx="1" fill="#3a2a1a"/>
  <rect x="32" y="33" width="8" height="4" rx="1" fill="#3a2a1a"/>
  <!-- Crops -->
  <line x1="11" y1="33" x2="11" y2="28" stroke="#4a4" stroke-width="1.5"/>
  <circle cx="11" cy="27" r="2.5" fill="#da2"/>
  <line x1="15" y1="33" x2="15" y2="29" stroke="#4a4" stroke-width="1.5"/>
  <circle cx="15" cy="28" r="2" fill="#a3f"/>
  <line x1="24" y1="33" x2="24" y2="26" stroke="#4a4" stroke-width="1.5"/>
  <circle cx="24" cy="25" r="3" fill="#e33"/>
  <line x1="28" y1="33" x2="28" y2="30" stroke="#4a4" stroke-width="1"/>
  <circle cx="28" cy="29.5" r="1.5" fill="#5d5"/>
  <!-- Star/sun -->
  <circle cx="38" cy="12" r="6" fill="#ff0" opacity="0.8"/>
  <circle cx="38" cy="12" r="4" fill="#ffa"/>
  <!-- Sparkles -->
  <circle cx="10" cy="20" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="30" cy="15" r="0.8" fill="#fff" opacity="0.5"/>
  <circle cx="20" cy="10" r="1.2" fill="#ff0" opacity="0.4"/>
  <!-- Space cow -->
  <text x="36" y="39" font-size="8" text-anchor="middle">🐄</text>
</svg>
