<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Arena background -->
  <rect x="2" y="2" width="44" height="44" rx="2" fill="#2d3436"/>
  <!-- Grid lines -->
  <line x1="13" y1="2" x2="13" y2="46" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <line x1="24" y1="2" x2="24" y2="46" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <line x1="35" y1="2" x2="35" y2="46" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <line x1="2" y1="13" x2="46" y2="13" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <line x1="2" y1="24" x2="46" y2="24" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <line x1="2" y1="35" x2="46" y2="35" stroke="#555" stroke-width="0.5" opacity="0.3"/>
  <!-- Indestructible walls -->
  <rect x="13" y="13" width="10" height="10" rx="1" fill="#666"/>
  <rect x="35" y="35" width="10" height="10" rx="1" fill="#666"/>
  <!-- Destructible brick -->
  <rect x="24" y="2" width="10" height="10" rx="1" fill="#a0522d"/>
  <rect x="25" y="3" width="8" height="8" rx="1" fill="#cd853f"/>
  <!-- Bomb -->
  <circle cx="18" cy="34" r="6" fill="#222"/>
  <circle cx="18" cy="29" r="2" fill="#ff0"/>
  <!-- Explosion -->
  <rect x="30" y="20" width="8" height="4" rx="1" fill="#ff6600" opacity="0.8"/>
  <rect x="32" y="16" width="4" height="12" rx="1" fill="#ff4500" opacity="0.7"/>
  <!-- Player -->
  <circle cx="8" cy="8" r="5" fill="#4ec0ca"/>
  <circle cx="6" cy="7" r="1.5" fill="#fff"/>
  <circle cx="10" cy="7" r="1.5" fill="#fff"/>
  <circle cx="6.5" cy="7" r="0.8" fill="#000"/>
  <circle cx="10.5" cy="7" r="0.8" fill="#000"/>
  <!-- Power-up -->
  <circle cx="40" cy="8" r="4" fill="#ffd700" opacity="0.7"/>
  <text x="40" y="10" font-size="6" font-weight="bold" fill="#fff" text-anchor="middle">F</text>
</svg>
